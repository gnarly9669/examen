<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reto de Infiltración</title>
    <style>
        /* 1. Fondo totalmente negro y cursor */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }

        /* 2. El efecto de Linterna (Gradiente Radial) */
        #flashlight {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none; /* Permite hacer clic a través de la capa */
            background: radial-gradient(
                circle 100px at center,
                transparent 0%,
                rgba(0, 0, 0, 0.98) 100%
            );
            z-index: 10;
        }

        /* 3. El Tesoro Oculto */
        #tesoro {
            position: absolute;
            width: 80px;
            height: 80px;
            cursor: pointer;
            z-index: 5;
            display: block;
        }

        /* 4. Pantalla de Victoria */
        #victory-screen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, #ff00ff, #00ffff, #ff0000, #00ff00);
            background-size: 400% 400%;
            animation: gradientBG 5s ease infinite;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 20;
            color: white;
            text-shadow: 2px 2px 10px #000;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Créditos en la esquina */
        .credits {
            position: fixed;
            bottom: 10px;
            right: 10px;
            font-size: 12px;
            color: #333;
            z-index: 30;
        }

        h1 { font-size: 3rem; margin-bottom: 20px; }
        img.celebracion { width: 300px; border-radius: 15px; }
    </style>
</head>
<body>

    <div id="flashlight"></div>
    
    <img src="tesoro.png" id="tesoro" alt="tesoro">

    <div id="victory-screen">
        <h1>¡Nivel Hacker Superado!</h1>
        <img src="celebración.gif" class="celebracion" alt="Celebración">
    </div>

    <div class="credits">Maximiliano Pérez Ruiz Esparza</div>

    <script>
        const flashlight = document.getElementById('flashlight');
        const tesoro = document.getElementById('tesoro');
        const victoryScreen = document.getElementById('victory-screen');

        // Lógica de la linterna: Seguir al mouse
        window.addEventListener('mousemove', (e) => {
            const x = e.clientX;
            const y = e.clientY;
            flashlight.style.background = `radial-gradient(circle 120px at ${x}px ${y}px, transparent 0%, rgba(0, 0, 0, 0.99) 100%)`;
        });

        // Lógica para esconder el tesoro en una posición aleatoria
        function posicionarTesoro() {
            const maxX = window.innerWidth - 100;
            const maxY = window.innerHeight - 100;
            const randomX = Math.floor(Math.random() * maxX);
            const randomY = Math.floor(Math.random() * maxY);
            
            tesoro.style.left = randomX + 'px';
            tesoro.style.top = randomY + 'px';
        }

        // Evento al encontrar y hacer clic en el tesoro
        tesoro.addEventListener('click', () => {
            victoryScreen.style.display = 'flex';
            flashlight.style.display = 'none';
        });

        // Inicializar posición
        posicionarTesoro();
    </script>
</body>
</html>
